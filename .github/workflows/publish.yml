name: CI Pipeline

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build test image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: development
          load: true
          tags: minerva:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start test database
        run: |
          docker network create minerva-test-net
          docker run -d --name postgres-test --network minerva-test-net \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=minerva_test \
            postgres:17.4
          sleep 5

      - name: Run tests
        run: |
          docker run --rm --network minerva-test-net \
            -e MINERVA_DATABASE_URL=postgresql://postgres:postgres@postgres-test:5432/minerva_test \
            minerva:test sh -c "pnpm prisma db push --schema=./server/prisma/schema.prisma --config=./server/prisma/prisma.config.ts && pnpm run test:server"

      - name: Cleanup
        if: always()
        run: |
          docker rm -f postgres-test || true
          docker network rm minerva-test-net || true

  build-and-push:
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: devleo/minerva
          tags: |
            type=ref,event=branch
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
